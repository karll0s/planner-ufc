<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC Planner</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --primary: #7c4dff;
            --secondary: #00e5ff;
            --accent: #ff4081;
            --text: #ffffff;
            --bus: #ffab00;
            --success: #00e676;
            --danger: #ff5252;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--secondary); text-align: center; margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 25px;
        }

        button {
            background: #1c222d;
            color: #eee;
            border: 1px solid #333;
            padding: 12px 8px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.1s;
            box-shadow: 0 4px 0 #000;
            text-transform: uppercase;
        }

        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }

        .btn-config { border-color: var(--bus); color: var(--bus); box-shadow: 0 4px 0 #916200; }
        .btn-notes { border-color: var(--success); color: var(--success); box-shadow: 0 4px 0 #007a3d; }
        .btn-grades {
            border-color: var(--secondary);
            color: #000;
            background: var(--secondary);
            grid-column: span 2;
            font-size: 0.9rem;
            padding: 16px;
            box-shadow: 0 5px 0 #0097a7;
        }
        .btn-backup { border-color: var(--primary); color: var(--primary); grid-column: span 2; box-shadow: 0 4px 0 #4a148c; }

        /* --- AJUSTE FLEXBOX NAS CONFIGURAÇÕES --- */
        #config-panel, #backup-panel {
            display: none;
            background: #1a1f29;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid var(--secondary);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
        }

        .config-box {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .config-box h4 { margin: 0 0 10px 0; color: var(--secondary); text-transform: uppercase; font-size: 0.8rem; }

        .config-row {
            display: flex;
            flex-wrap: wrap; /* Mágica para não ter scroll horizontal */
            gap: 6px;
            margin-bottom: 10px;
            align-items: center;
        }

        #config-panel input {
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        /* Comportamento dos Inputs no Flex */
        .in-bus { flex: 1 1 100%; border-color: var(--bus) !important; color: var(--bus) !important; font-weight: bold; }
        .in-time { flex: 1 1 65px; text-align: center; }
        .in-aula { flex: 2 1 120px; } /* Matéria ganha mais espaço */
        .in-sala { flex: 1 1 55px; text-align: center; color: var(--accent) !important; font-weight: bold; }

        .btn-del {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0; /* Não deixa o X sumir */
        }
        /* ----------------------------------------- */

        .quick-add { display: flex; gap: 8px; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .quick-add input[type="text"] { flex: 1; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 8px; font-size: 0.85rem; }
        .quick-add input[type="date"] { width: 120px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 5px; font-size: 0.75rem; }
        .btn-add-quick { background: var(--success); color: #000; border: none; padding: 8px 15px; border-radius: 8px; box-shadow: 0 3px 0 #007a3d; font-size: 1rem; }

        .section-title { color: var(--primary); text-transform: uppercase; font-size: 0.85rem; margin: 30px 0 12px 0; border-bottom: 2px solid var(--primary); width: 100%; letter-spacing: 2px; font-weight: 900; padding-bottom: 5px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .card.today-highlight {
            border: 2px solid var(--secondary);
            background: linear-gradient(145deg, #151921 0%, #1a2b3d 100%);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }
        .today-badge { background: var(--secondary); color: #000; font-size: 0.65rem; padding: 3px 10px; border-radius: 10px; vertical-align: middle; margin-left: 10px; font-weight: 900; }

        .card h2 { color: var(--secondary); margin: 0 0 12px 0; font-size: 1.4rem; font-weight: 800; }
        .bus-txt { color: var(--bus); font-size: 0.85rem; font-weight: 900; margin-bottom: 15px; display: block; background: rgba(255, 171, 0, 0.1); padding: 8px; border-radius: 10px; border-left: 4px solid var(--bus); }

        .aula-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .time { color: var(--primary); font-weight: 900; margin-right: 8px; }
        .sala { color: var(--accent); font-weight: 900; background: rgba(255, 64, 129, 0.1); padding: 3px 8px; border-radius: 6px; font-size: 0.8rem; border: 1px solid rgba(255, 64, 129, 0.2); }

        textarea { width: 100%; background: #000; color: #eee; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-top: 10px; min-height: 100px; resize: none; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        textarea:focus { border-color: var(--secondary); outline: none; }

        .todo-line { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #222; }
        .todo-line input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--success); cursor: pointer; }
        .todo-text { flex: 1; font-weight: 500; }

        .btn-clean { background: rgba(255, 82, 82, 0.05); border: 1px solid var(--danger); color: var(--danger); width: 100%; margin-top: 15px; padding: 10px; font-weight: 800; border-radius: 12px; box-shadow: 0 3px 0 #7e1d1d; }

        #importFile { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>UFC</h1>

        <div class="menu">
            <button class="btn-grades" onclick="irParaNotas()">📊 Ver Pontuações e Médias</button>
            <button class="btn-config" onclick="toggleConfig()">⚙️ Configurações</button>
            <button class="btn-notes" onclick="baixarNotasTxt()">📄 Baixar Notas (.txt)</button>
            <button class="btn-backup" onclick="toggleBackup()">📂 Backup do Semestre</button>
        </div>

        <div id="backup-panel">
            <h3 style="margin-top:0; color: var(--secondary)">Backup Completo</h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="baixarEstrutura()" style="border-color: var(--success); color: var(--success);">📤 Exportar</button>
                <button onclick="document.getElementById('importFile').click()" style="border-color: var(--secondary); color: var(--secondary);">📥 Importar</button>
                <input type="file" id="importFile" accept=".json" onchange="importarBackup(this)">
            </div>
            <button onclick="toggleBackup()" style="margin-top: 15px; border:none; background:none; color: #666; font-weight: bold;">[ FECHAR ]</button>
        </div>

        <div id="config-panel">
            <h3 style="margin-top:0; color: var(--bus)">⚙️ Editar Cronograma</h3>
            <div id="dias-editor"></div>

            <h3 style="color: var(--secondary)">📚 Matérias</h3>
            <div id="mats-editor"></div>
            <button onclick="addItem('materias')" style="width:100%; padding:12px; margin-top:10px; border-color: var(--secondary);">+ Nova Matéria</button>

            <button style="background: var(--success); color: #000; border: none; width: 100%; margin: 30px 0 10px 0; padding: 20px; border-radius: 12px; font-weight: 900; font-size: 1rem; box-shadow: 0 5px 0 #007a3d;" onclick="salvarEFechar()">✅ SALVAR TUDO</button>
        </div>

        <div id="render-area"></div>
    </div>

    <script>
        const defaultData = {
            dias: [
                { nome: "Segunda", bus: "16:15 ➔ 21:40", aulas: [["17:30", "Matéria 1", "S01"]] },
                { nome: "Terça", bus: "12:20 ➔ 17:40", aulas: [["13:00", "Matéria 2", "S02"]] },
                { nome: "Quarta", bus: "12:20 ➔ 15:20", aulas: [["13:00", "Matéria 2", "S02"]] },
                { nome: "Quinta", bus: "16:15 ➔ 21:40", aulas: [["17:30", "Matéria 3", "S03"]] },
                { nome: "Sexta", bus: "12:20 ➔ 19:40", aulas: [["13:00", "Matéria 1", "S01"]] }
            ],
            materias: ["Matéria 1", "Matéria 2"],
            todos: []
        };

        let dados = JSON.parse(localStorage.getItem('ufc_planner_data_v6_9')) || defaultData;

        function irParaNotas() {
            localStorage.setItem('ufc_materias_transporte', JSON.stringify(dados.materias));
            window.location.href = 'notas.html';
        }

        function desenharTudo() {
            const area = document.getElementById('render-area');
            let html = "";
            const hojeData = new Date().toISOString().split('T')[0];
            const hojeNome = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"][new Date().getDay()];

            html += '<div class="section-title">💡 Lembretes Gerais</div>';
            html += '<div class="card"><textarea id="not-geral" placeholder="Escreva lembretes importantes aqui..."></textarea></div>';

            html += '<div class="section-title">✅ Check-list</div><div class="card">';
            html += `
                <div class="quick-add">
                    <input type="text" id="new-todo-text" placeholder="Nova tarefa...">
                    <input type="date" id="new-todo-date">
                    <button class="btn-add-quick" onclick="addTodoRapido()">+</button>
                </div>
                <div id="todo-list-area">`;

            if(dados.todos.length === 0) html += '<p style="color:#666; font-size:0.85rem; text-align:center; padding:10px;">Nada para fazer. Relaxe! ☕</p>';

            dados.todos.forEach((t, i) => {
                const status = localStorage.getItem(`chk-${i}`) === 'true' ? 'checked' : '';
                const eHoje = (t.data === hojeData) ? 'style="color: var(--secondary); font-weight:bold;"' : '';
                const dataFmt = t.data ? t.data.split('-').reverse().join('/') : '';
                html += `
                <label class="todo-line">
                    <input type="checkbox" id="chk-${i}" ${status} onchange="localStorage.setItem(this.id, this.checked)">
                    <span class="todo-text" ${eHoje}>${t.texto}</span>
                    ${t.data ? `<span style="font-size:0.75rem; color:var(--bus); font-weight:bold;">📅 ${dataFmt}</span>` : ''}
                    <button onclick="removerTodo(${i})" class="btn-del">✕</button>
                </label>`;
            });
            html += `</div><button class="btn-clean" onclick="limparConcluidos()">🧹 Limpar Concluídas</button></div>`;

            html += '<div class="section-title">📅 Cronograma</div>';
            dados.dias.forEach(d => {
                const eHoje = (d.nome === hojeNome) ? 'today-highlight' : '';
                html += `<div class="card ${eHoje}">
                    <h2>${d.nome}${eHoje ? '<span class="today-badge">HOJE</span>' : ''}</h2>
                    <span class="bus-txt">🚌 Ônibus: ${d.bus}</span>`;
                d.aulas.forEach(a => {
                    html += `<div class="aula-item"><span><span class="time">${a[0]}</span> ${a[1]}</span><span class="sala">${a[2]}</span></div>`;
                });
                html += `</div>`;
            });

            html += '<div class="section-title">📚 Anotações de Matérias</div>';
            dados.materias.forEach(m => {
                html += `<div class="card"><h2>${m}</h2><textarea id="not-${m}" placeholder="Anotações para ${m}..."></textarea></div>`;
            });

            area.innerHTML = html;
            recuperarNotas();
        }

        function addTodoRapido() {
            const txt = document.getElementById('new-todo-text').value;
            const data = document.getElementById('new-todo-date').value;
            if(!txt) return;
            dados.todos.push({texto: txt, data: data});
            localStorage.setItem('ufc_planner_data_v6_9', JSON.stringify(dados));
            desenharTudo();
        }

        function removerTodo(idx) {
            dados.todos.splice(idx, 1);
            localStorage.setItem('ufc_planner_data_v6_9', JSON.stringify(dados));
            desenharTudo();
        }

        function limparConcluidos() {
            if(!confirm("Remover tarefas concluídas?")) return;
            const novasTarefas = [];
            dados.todos.forEach((t, i) => {
                if(localStorage.getItem(`chk-${i}`) !== 'true') novasTarefas.push(t);
                localStorage.removeItem(`chk-${i}`);
            });
            dados.todos = novasTarefas;
            localStorage.setItem('ufc_planner_data_v6_9', JSON.stringify(dados));
            desenharTudo();
        }

        function recuperarNotas() {
            document.querySelectorAll('textarea').forEach(tx => {
                tx.value = localStorage.getItem(tx.id) || '';
                tx.addEventListener('input', () => localStorage.setItem(tx.id, tx.value));
            });
        }

        function baixarEstrutura() {
            const backupTotal = {
                config: dados,
                storage: {},
                notas: JSON.parse(localStorage.getItem('ufc_sistema_notas_v1')) || {}
            };
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('not-') || k.startsWith('chk-')) backupTotal.storage[k] = localStorage.getItem(k);
            }
            const blob = new Blob(["\ufeff" + JSON.stringify(backupTotal, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `backup_ufc_ultimate.json`;
            link.click();
        }

        function importarBackup(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const b = JSON.parse(e.target.result);
                if(!confirm("Restaurar backup?")) return;
                localStorage.clear();
                dados = b.config;
                localStorage.setItem('ufc_planner_data_v6_9', JSON.stringify(dados));
                if(b.notas) localStorage.setItem('ufc_sistema_notas_v1', JSON.stringify(b.notas));
                if(b.storage) Object.keys(b.storage).forEach(k => localStorage.setItem(k, b.storage[k]));
                desenharTudo();
                alert("✅ Restaurado!");
            };
            reader.readAsText(input.files[0]);
        }

        function baixarNotasTxt() {
            let txt = `🗒️ NOTAS UFC\n\n`;
            dados.materias.forEach(m => {
                const n = localStorage.getItem(`not-${m}`);
                if(n) txt += `> ${m}: ${n}\n\n`;
            });
            const blob = new Blob(["\ufeff" + txt], {type: 'text/plain;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `anotacoes_ufc.txt`;
            link.click();
        }

        function toggleBackup() {
            const p = document.getElementById('backup-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function toggleConfig() {
            const p = document.getElementById('config-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
            if(p.style.display === 'block') abrirEditor();
        }

        function abrirEditor() {
            const dEd = document.getElementById('dias-editor');
            const mEd = document.getElementById('mats-editor');
            dEd.innerHTML = "";
            dados.dias.forEach((d, i) => {
                let diaHtml = `<div class="config-box"><h4>${d.nome}</h4>
                    <div class="config-row">🚌 <input type="text" class="in-bus" value="${d.bus}" onchange="dados.dias[${i}].bus=this.value"></div>`;
                d.aulas.forEach((aula, ai) => {
                    diaHtml += `<div class="config-row">
                        <input type="text" class="in-time" placeholder="Hora" value="${aula[0]}" onchange="dados.dias[${i}].aulas[${ai}][0]=this.value">
                        <input type="text" class="in-aula" placeholder="Aula" value="${aula[1]}" onchange="dados.dias[${i}].aulas[${ai}][1]=this.value">
                        <input type="text" class="in-sala" placeholder="Sala" value="${aula[2]}" onchange="dados.dias[${i}].aulas[${ai}][2]=this.value">
                        <button class="btn-del" onclick="dados.dias[${i}].aulas.splice(${ai},1); abrirEditor()">✕</button>
                    </div>`;
                });
                diaHtml += `<button onclick="dados.dias[${i}].aulas.push(['','','']); abrirEditor()" style="width:100%; font-size:0.75rem; box-shadow:none; margin-top:5px;">+ Adicionar Aula</button></div>`;
                dEd.innerHTML += diaHtml;
            });
            mEd.innerHTML = "";
            dados.materias.forEach((m, i) => {
                mEd.innerHTML += `<div class="config-row">
                    <input type="text" value="${m}" onchange="dados.materias[i]=this.value" style="flex:1">
                    <button class="btn-del" onclick="dados.materias.splice(${i},1); abrirEditor()">✕</button>
                </div>`;
            });
        }

        function addItem(tipo) {
            dados.materias.push("");
            abrirEditor();
        }

        function salvarEFechar() {
            localStorage.setItem('ufc_planner_data_v6_9', JSON.stringify(dados));
            desenharTudo();
            toggleConfig();
        }

        window.onload = desenharTudo;
    </script>
</body>
</html>
