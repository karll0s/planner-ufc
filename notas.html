<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC Notas - Ultimate v7.4</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --primary: #7c4dff;
            --secondary: #00e5ff;
            --accent: #ff4081;
            --text: #ffffff;
            --success: #00e676;
            --danger: #ff5252;
            --warning: #ffab00;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--secondary); text-align: center; margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }

        .top-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 25px; }

        /* Efeito 3D Neon */
        button {
            background: #1c222d;
            color: #eee;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.1s;
            box-shadow: 0 4px 0 #000;
            text-transform: uppercase;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }

        .btn-back { border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 0 #4a148c; }
        .btn-download { border-color: var(--success); color: var(--success); box-shadow: 0 4px 0 #007a3d; }
        .btn-add-np { background: var(--primary); color: #fff; border: none; margin-top: 15px; width: 100%; border-radius: 12px; box-shadow: 0 4px 0 #4a148c; }

        .materia-card {
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 30px;
            border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .materia-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #2a2a2a; padding-bottom: 12px; margin-bottom: 15px;
        }
        .materia-title { color: var(--secondary); font-size: 1.4rem; font-weight: 900; margin: 0; text-shadow: 0 0 5px rgba(0, 229, 255, 0.2); }

        .np-box {
            background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border: 1px solid #333; border-left: 6px solid var(--primary);
        }
        .np-header { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--primary); font-weight: 900; font-size: 1rem; }

        .nota-row { display: grid; grid-template-columns: 1.5fr 0.7fr 0.9fr 35px; gap: 8px; margin-bottom: 10px; align-items: center; }
        input {
            background: #000; color: #fff; border: 1px solid #444; padding: 10px;
            border-radius: 10px; font-size: 0.9rem; width: 100%; box-sizing: border-box; font-weight: 600;
        }
        input:focus { border-color: var(--secondary); outline: none; }

        .previsao-tag {
            background: rgba(124, 77, 255, 0.1); color: var(--primary); border: 1px dashed var(--primary);
            padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-top: 12px; font-weight: 800; text-align: center;
        }

        .media-final-area {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 20px; padding-top: 15px; border-top: 1px dashed #444; gap: 12px;
        }

        .status-badge { padding: 10px 25px; border-radius: 12px; font-size: 0.85rem; font-weight: 900; letter-spacing: 1px; color: #000; }
        .aprovado { background: var(--success); box-shadow: 0 4px 0 #007a3d; }
        .recuperacao { background: var(--warning); box-shadow: 0 4px 0 #916200; }
        .reprovado { background: var(--danger); box-shadow: 0 4px 0 #7e1d1d; color: #fff; }

        .btn-del-small { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; box-shadow: none; padding: 0; }
        .btn-del-small:active { transform: scale(0.9); }

        .semestre-input {
            background: #000; border: 2px solid var(--primary); border-radius: 15px;
            color: var(--primary); text-align: center; font-weight: 900; width: 140px; margin-bottom: 30px; padding: 10px; font-size: 1rem;
            box-shadow: 0 4px 0 #4a148c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 HISTÓRICO DE NOTAS</h1>

        <div class="top-menu">
            <button class="btn-back" onclick="window.location.href='index.html'">⬅️ VOLTAR AO PLANNER</button>
            <button class="btn-download" onclick="baixarHistorico()">📥 SALVAR RELATÓRIO</button>
        </div>

        <div style="text-align: center;">
            <input type="text" id="input-semestre" class="semestre-input" value="2026.1" placeholder="Semestre">
        </div>

        <div id="materias-container"></div>
    </div>

    <script>
        // Carrega matérias do Planner para adicionar novas, mas não apaga as que já estão aqui
        let listaMateriasPlanner = JSON.parse(localStorage.getItem('ufc_materias_transporte')) || [];
        let dadosNotas = JSON.parse(localStorage.getItem('ufc_sistema_notas_v1')) || {};

        function sincronizar() {
            // Apenas adiciona se a matéria for nova. Não remove nada para manter o histórico!
            listaMateriasPlanner.forEach(m => {
                if (!dadosNotas[m]) dadosNotas[m] = { parciais: [] };
            });
            salvar();
        }

        function salvar() {
            localStorage.setItem('ufc_sistema_notas_v1', JSON.stringify(dadosNotas));
        }

        function renderizar() {
            const container = document.getElementById('materias-container');
            container.innerHTML = "";

            Object.keys(dadosNotas).forEach(mNome => {
                const mData = dadosNotas[mNome];
                let htmlMateria = `
                    <div class="materia-card">
                        <div class="materia-header">
                            <h3 class="materia-title">${mNome}</h3>
                            <button class="btn-del-small" onclick="apagarMateria('${mNome}')" title="Limpar Tudo">🗑️</button>
                        </div>
                        <div id="parciais-${mNome}">`;

                let somaMediasEtapas = 0;
                let etapasCompletas = 0;

                mData.parciais.forEach((p, pIdx) => {
                    htmlMateria += `
                        <div class="np-box">
                            <div class="np-header">
                                <span>⚡ ${p.nome}</span>
                                <button class="btn-del-small" onclick="removerNP('${mNome}', ${pIdx})">✕</button>
                            </div>`;

                    let somaPonderada = 0;
                    let somaPesos = 0;
                    let notaFaltante = null;

                    p.notas.forEach((n, nIdx) => {
                        const val = parseFloat(n.valor);
                        const peso = parseFloat(n.peso) || 0;
                        if (!isNaN(val)) {
                            somaPonderada += (val * peso);
                            somaPesos += peso;
                        } else {
                            notaFaltante = { tipo: n.tipo || 'Próxima Nota', peso: peso };
                            somaPesos += peso;
                        }

                        htmlMateria += `
                            <div class="nota-row">
                                <input type="text" placeholder="Atividade" value="${n.tipo}" onchange="atualizarNota('${mNome}', ${pIdx}, ${nIdx}, 'tipo', this.value)">
                                <input type="number" placeholder="Peso" value="${n.peso}" onchange="atualizarNota('${mNome}', ${pIdx}, ${nIdx}, 'peso', this.value)">
                                <input type="number" step="0.1" placeholder="Nota" value="${n.valor}" onchange="atualizarNota('${mNome}', ${pIdx}, ${nIdx}, 'valor', this.value)">
                                <button class="btn-del-small" onclick="removerLinhaNota('${mNome}', ${pIdx}, ${nIdx})">×</button>
                            </div>`;
                    });

                    if (notaFaltante) {
                        let qtoFalta = (7 * (somaPesos || 1) - somaPonderada) / (notaFaltante.peso || 1);
                        htmlMateria += `<div class="previsao-tag">🎯 Meta: tirar <b>${Math.max(0, qtoFalta).toFixed(1)}</b> na ${notaFaltante.tipo}</div>`;
                    } else if (somaPesos > 0) {
                        let mediaEtapa = somaPonderada / somaPesos;
                        somaMediasEtapas += mediaEtapa;
                        etapasCompletas++;
                        htmlMateria += `<div style="text-align:right; font-size:0.9rem; color:var(--success); margin-top:10px; font-weight:900;">Média: ${mediaEtapa.toFixed(1)}</div>`;
                    }

                    htmlMateria += `
                            <button style="font-size:0.7rem; margin-top:12px; padding:10px; border-style: dashed; width:100%; box-shadow:none;" onclick="addLinhaNota('${mNome}', ${pIdx})">+ ADICIONAR NOTA</button>
                        </div>`;
                });

                let mediaFinal = etapasCompletas > 0 ? somaMediasEtapas / etapasCompletas : 0;
                let statusClass = "reprovado"; let statusTxt = "REPROVADO";
                if(mediaFinal >= 7) { statusClass = "aprovado"; statusTxt = "APROVADO 🏆"; }
                else if(mediaFinal >= 4) { statusClass = "recuperacao"; statusTxt = "EM RECUPERAÇÃO"; }

                htmlMateria += `
                        </div>
                        <button class="btn-add-np" onclick="addNP('${mNome}')">+ NOVA ETAPA (NP${mData.parciais.length + 1})</button>
                        <div class="media-final-area">
                            <span style="font-weight:900; font-size:1.1rem;">Média Final: <span style="color:var(--secondary)">${mediaFinal.toFixed(1)}</span></span>
                            <span class="status-badge ${statusClass}">${statusTxt}</span>
                        </div>
                    </div>`;
                container.innerHTML += htmlMateria;
            });
        }

        // Funções de Lógica
        function addNP(m) {
            dadosNotas[m].parciais.push({ nome: 'NP' + (dadosNotas[m].parciais.length + 1), notas: [] });
            salvar(); renderizar();
        }
        function removerNP(m, idx) {
            if(confirm("Remover esta etapa e suas notas?")) { dadosNotas[m].parciais.splice(idx, 1); salvar(); renderizar(); }
        }
        function addLinhaNota(m, pIdx) {
            dadosNotas[m].parciais[pIdx].notas.push({ tipo: '', peso: 1, valor: '' });
            salvar(); renderizar();
        }
        function removerLinhaNota(m, pIdx, nIdx) {
            dadosNotas[m].parciais[pIdx].notas.splice(nIdx, 1);
            salvar(); renderizar();
        }
        function atualizarNota(m, pIdx, nIdx, campo, valor) {
            dadosNotas[m].parciais[pIdx].notas[nIdx][campo] = valor;
            salvar(); renderizar();
        }
        function apagarMateria(m) {
            if(confirm(`Deseja apagar todas as notas de ${m}?`)) { dadosNotas[m] = { parciais: [] }; salvar(); renderizar(); }
        }

        function baixarHistorico() {
            const sem = document.getElementById('input-semestre').value;
            let txt = `📊 RELATÓRIO DE DESEMPENHO - ${sem}\n`;
            txt += `-------------------------------------------\n\n`;
            Object.keys(dadosNotas).forEach(m => {
                const data = dadosNotas[m];
                txt += `📚 DISCIPLINA: ${m.toUpperCase()}\n`;
                let soma = 0; let cont = 0;
                data.parciais.forEach(p => {
                    let sp = 0; let sw = 0;
                    p.notas.forEach(n => {
                        sp += (parseFloat(n.valor) || 0) * (parseFloat(n.peso) || 0);
                        sw += (parseFloat(n.peso) || 0);
                    });
                    let mEtapa = sp / (sw || 1);
                    soma += mEtapa; cont++;
                    txt += `   [${p.nome}]: ${mEtapa.toFixed(1)}\n`;
                });
                txt += `   >> MÉDIA FINAL: ${(cont > 0 ? soma/cont : 0).toFixed(1)}\n\n`;
            });
            const blob = new Blob(["\ufeff" + txt], {type: 'text/plain;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Notas_UFC_${sem.replace('.','_')}.txt`;
            link.click();
        }

        sincronizar();
        renderizar();
    </script>
</body>
</html>
